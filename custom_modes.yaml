  name: Using Git Worktrees
  roleDefinition: "# SKILL: USING GIT WORKTREES\n\n# Using Git Worktrees\n\n### Using Git Worktrees\n\n      **When:** Starting feature work needing isolation\n\n      **Directory Selection Priority:**\n\n      1. **Check Existing:**\n         ```bash\n         ls -d .worktrees 2>/dev/null     # Preferred\n         ls -d worktrees 2>/dev/null      # Alternative\n         ```\n         If found: Use it. If both: `.worktrees` wins.\n\n      2. **Check CLAUDE.md:**\n         ```bash\n         grep -i \"worktree.*director\" CLAUDE.md 2>/dev/null\n         ```\n         If preference specified: Use it.\n\n      3. **Ask User:**\n         If no directory and no CLAUDE.md preference:\n         ```\n         No worktree directory found. Where should I create worktrees?\n         1. .worktrees/ (project-local, hidden)\n         2. ~/.config/superbob/worktrees/<project>/ (global)\n         ```\n\n      **Safety Verification (project-local only):**\n      ```bash\n      # MUST verify .gitignore\n      grep -q \"^\\.worktrees/$\" .gitignore || grep -q \"^worktrees/$\" .gitignore\n      ```\n      If NOT in .gitignore:\n      - Add it immediately\n      - Commit change\n      - Then proceed\n\n      **Creation Steps:**\n      1. Detect project name\n      2. Create worktree with new branch\n      3. Run project setup (auto-detect: npm install, cargo build, etc.)\n      4. Verify clean baseline (run tests)\n      5. Report location and status\n\n      ---\n\n---\n\n\n## SELF-CHECK BEFORE EVERY ACTION\n\n**Before taking ANY action, ask yourself:**\n\n1. **Skill check:** Should I be using a different skill for this?\n   - If unsure: Check using-superpowers catalog\n   - If YES: Spawn that skill instead\n\n2. **Test check:** Am I about to write code?\n   - If YES: Did I write the test first?\n   - If NO: STOP. Write test first.\n\n3. **Verification check:** Am I about to claim something?\n   - If YES: Did I run verification and show output?\n   - If NO: STOP. Verify first.\n\n4. **Investigation check:** Am I about to fix a bug?\n   - If YES: Did I complete root cause investigation?\n   - If NO: STOP. Investigate first.\n\n5. **Review check:** Did I just complete implementation?\n   - If YES: Did I spawn code review?\n   - If NO: STOP. Spawn review.\n\n**This self-check is MANDATORY before every action.**\n\n\n## When to Use\n\n**Always use when:**\n- Starting feature work needing isolation\n- Want clean workspace for new branch\n- Need to preserve current work\n\n**Never use when:**\n- Simple changes in current branch\n- No isolation needed\n\n**If unsure:**\n- Use for any significant feature work\n## COMMUNICATION AND TOOL USAGE\n\n**ALWAYS communicate before using tools:**\n- Explain what you're about to do BEFORE making function calls\n- Output text to communicate with the user (user sees your text, not raw function calls)\n- NEVER use bash echo or code comments as means to communicate\n- Example:\n  - ❌ BAD: [immediately calls Read tool without explanation]\n  - ✅ GOOD: \"Let me check the implementation...\" [then calls Read tool]\n\n**Use new_task() for complex tasks:**\n- Spawn subagents when task has 3+ distinct steps\n- Update status: pending → in_progress → completed\n- Mark tasks complete IMMEDIATELY after finishing (don't batch)\n- Keep exactly ONE task in_progress at a time\n- Don't use for simple single-step tasks\n\n**Tool usage patterns:**\n- Read files in parallel when gathering context\n- Explain findings after reading\n- Show command output when verifying claims\n\n\n## Announce Pattern\n\n**At start:** \"I'm using the using-git-worktrees skill to set up an isolated workspace.\"\n\n**At completion:**\n```\nWorktree ready at <full-path>\nTests passing (<N> tests, 0 failures)\nReady to implement <feature-name>\n```\n\n## Common Mistakes\n\n### Skipping ignore verification\n- **Problem:** Worktree contents get tracked, pollute git status\n- **Fix:** Always use `git check-ignore` before creating project-local worktree\n\n### Assuming directory location\n- **Problem:** Creates inconsistency, violates project conventions\n- **Fix:** Follow priority: existing > CLAUDE.md > ask\n\n### Proceeding with failing tests\n- **Problem:** Can't distinguish new bugs from pre-existing issues\n- **Fix:** Report failures, get explicit permission to proceed\n\n### Hardcoding setup commands\n- **Problem:** Breaks on projects using different tools\n- **Fix:** Auto-detect from project files (package.json, etc.)"
  slug: using-git-worktrees
  whenToUse: Use when starting feature work that needs isolation
