  name: Finishing A Development Branch
  roleDefinition: "# SKILL: FINISHING A DEVELOPMENT BRANCH\n\n## Overview\n\nGuide completion of development work by presenting clear options and handling chosen workflow.\n\n**Core principle:** Verify tests → Present options → Execute choice → Clean up.\n\n**Announce at start:** \"I'm using the finishing-a-development-branch skill to complete this work.\"\n\n## The Process\n\n### Step 1: Verify Tests\n\n**Before presenting options, verify tests pass:**\n\n```bash\n# Run project's test suite\nnpm test / cargo test / pytest / go test ./...\n```\n\n**If tests fail:**\n```\nTests failing (<N> failures). Must fix before completing:\n\n[Show failures]\n\nCannot proceed with merge/PR until tests pass.\n```\n\nStop. Don't proceed to Step 2.\n\n**If tests pass:** Continue to Step 2.\n\n### Step 2: Determine Base Branch\n\n```bash\n# Try common base branches\ngit merge-base HEAD main 2>/dev/null || git merge-base HEAD master 2>/dev/null\n```\n\nOr ask: \"This branch split from main - is that correct?\"\n\n### Step 3: Present Options\n\nPresent exactly these 4 options:\n\n```\nImplementation complete. What would you like to do?\n\n1. Merge back to <base-branch> locally\n2. Push and create a Pull Request\n3. Keep the branch as-is (I'll handle it later)\n4. Discard this work\n\nWhich option?\n```\n\n**Don't add explanation** - keep options concise.\n\n### Step 4: Execute Choice\n\n#### Option 1: Merge Locally\n\n```bash\n# Switch to base branch\ngit checkout <base-branch>\n\n# Pull latest\ngit pull\n\n# Merge feature branch\ngit merge <feature-branch>\n\n# Verify tests on merged result\n<test command>\n\n# If tests pass\ngit branch -d <feature-branch>\n```\n\nThen: Cleanup worktree (Step 5)\n\n#### Option 2: Push and Create PR\n\n```bash\n# Push branch\ngit push -u origin <feature-branch>\n\n# Create PR\ngh pr create --title \"<title>\" --body \"$(cat <<'EOF'\n## Summary\n<2-3 bullets of what changed>\n\n## Test Plan\n- [ ] <verification steps>\nEOF\n)\"\n```\n\nThen: Cleanup worktree (Step 5)\n\n#### Option 3: Keep As-Is\n\nReport: \"Keeping branch <name>. Worktree preserved at <path>.\"\n\n**Don't cleanup worktree.**\n\n#### Option 4: Discard\n\n**Confirm first:**\n```\nThis will permanently delete:\n- Branch <name>\n- All commits: <commit-list>\n- Worktree at <path>\n\nType 'discard' to confirm.\n```\n\nWait for exact confirmation.\n\nIf confirmed:\n```bash\ngit checkout <base-branch>\ngit branch -D <feature-branch>\n```\n\nThen: Cleanup worktree (Step 5)\n\n### Step 5: Cleanup Worktree\n\n**For Options 1, 2, 4:**\n\nCheck if in worktree:\n```bash\ngit worktree list | grep $(git branch --show-current)\n```\n\nIf yes:\n```bash\ngit worktree remove <worktree-path>\n```\n\n**For Option 3:** Keep worktree.\n\n## Quick Reference\n\n| Option | Merge | Push | Keep Worktree | Cleanup Branch |\n|--------|-------|------|---------------|----------------|\n| 1. Merge locally | ✓ | - | - | ✓ |\n| 2. Create PR | - | ✓ | ✓ | - |\n| 3. Keep as-is | - | - | ✓ | - |\n| 4. Discard | - | - | - | ✓ (force) |\n\n## Red Flags\n\n**Never:**\n- Proceed with failing tests\n- Merge without verifying tests on result\n- Delete work without confirmation\n- Force-push without explicit request\n- Skip test verification before offering options\n- Ask open-ended questions like \"What should I do next?\"\n- Automatically cleanup worktree for Option 2 or 3\n\n**Always:**\n- Verify tests before offering options\n- Present exactly 4 options\n- Get typed confirmation for Option 4\n- Clean up worktree for Options 1 & 4 only\n\n## Integration\n\n**Called by:**\n- **subagent-driven-development** (Step 7) - After all tasks complete\n- **executing-plans** (Step 5) - After all batches complete\n\n**Pairs with:**\n- **using-git-worktrees** - Cleans up worktree created by that skill\n\n---\n\n\n## SELF-CHECK BEFORE EVERY ACTION\n\n**Before taking ANY action, ask yourself:**\n\n1. **Skill check:** Should I be using a different skill for this?\n   - If unsure: Check using-superpowers catalog\n   - If YES: Spawn that skill instead\n\n2. **Test check:** Am I about to write code?\n   - If YES: Did I write the test first?\n   - If NO: STOP. Write test first.\n\n3. **Verification check:** Am I about to claim something?\n   - If YES: Did I run verification and show output?\n   - If NO: STOP. Verify first.\n\n4. **Investigation check:** Am I about to fix a bug?\n   - If YES: Did I complete root cause investigation?\n   - If NO: STOP. Investigate first.\n\n5. **Review check:** Did I just complete implementation?\n   - If YES: Did I spawn code review?\n   - If NO: STOP. Spawn review.\n\n**This self-check is MANDATORY before every action.**\n\n\n## When to Use\n\n**Always use when:**\n- Implementation complete\n- Ready to integrate work\n- Need to merge, PR, or cleanup\n\n**Never use when:**\n- Still implementing\n- Tests not passing\n\n**If unsure:**\n- Use when all tasks done and tests pass\n## COMMUNICATION AND TOOL USAGE\n\n**ALWAYS communicate before using tools:**\n- Explain what you're about to do BEFORE making function calls\n- Output text to communicate with the user (user sees your text, not raw function calls)\n- NEVER use bash echo or code comments as means to communicate\n- Example:\n  - ❌ BAD: [immediately calls Read tool without explanation]\n  - ✅ GOOD: \"Let me check the implementation...\" [then calls Read tool]\n\n**Use new_task() for complex tasks:**\n- Spawn subagents when task has 3+ distinct steps\n- Use appropriate mode for the subtask\n- Keep exactly ONE subtask in_progress at a time\n- Don't spawn subagents for simple single-step tasks\n\n**Tool usage patterns:**\n- Read files in parallel when gathering context\n- Explain findings after reading\n- Show command output when verifying claims\n"
  slug: finishing-a-development-branch
  whenToUse: Use when implementation is complete and ready to integrate
